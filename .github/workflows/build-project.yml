name: Build Project

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout the code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup .NET 9
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. Restore NuGet packages
      - name: Restore NuGet packages
        run: dotnet restore FileRedirector.slnx

      # 4. Build the project
      - name: Build
        run: |
          dotnet build FileRedirector.csproj `
            --configuration Release `
            --no-restore `

      # 5. Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileRedirector
          path: bin\Release\
          retention-days: 30
